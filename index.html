<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<link rel="apple-touch-icon" sizes="180x180" href="./icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Bacon Trainer" />
<title>Bacon Trainer</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f7ded8;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
    cursor: pointer;
  }
  .hud {
    position: fixed;
    inset: 12px 12px auto 12px;
    display: flex;
    justify-content: flex-end;
    pointer-events: none;
    color: #7a6d66;
    z-index: 2;
  }
  .scoreCard {
    min-width: 124px;
    padding: 9px 13px;
    border: 3px solid rgba(255,255,255,.86);
    background: rgba(255,255,255,.62);
    border-radius: 18px;
    text-align: center;
    backdrop-filter: blur(4px);
    box-shadow: 0 8px 24px rgba(180,120,110,.12);
  }
  .scoreCard small { display: block; font-weight: 800; opacity: .52; letter-spacing: .04em; }
  .scoreCard b { font-size: 31px; line-height: 1.05; font-family: Georgia, serif; color: #8b7970; }
  .scoreCard span { display: block; font-size: 13px; font-weight: 800; opacity: .62; }

  .gear {
    position: fixed;
    right: 14px;
    bottom: 14px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 0;
    margin: 0;
    padding: 0;
    display: grid;
    place-items: center;
    background: rgba(47,47,47,.94);
    color: white;
    z-index: 6;
    box-shadow: 0 12px 30px rgba(80,40,40,.22);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .gear svg { width: 25px; height: 25px; display: block; }
  .gear:active { transform: translateY(1px) scale(.98); }

  .panel {
    position: fixed;
    right: 12px;
    bottom: 72px;
    width: min(380px, calc(100vw - 24px));
    max-height: calc(100vh - 96px);
    overflow: auto;
    background: rgba(255,255,255,.94);
    border: 1px solid rgba(255,255,255,.9);
    border-radius: 18px;
    padding: 14px;
    box-shadow: 0 18px 45px rgba(80,40,40,.18);
    transform: translateY(18px);
    opacity: 0;
    pointer-events: none;
    transition: .18s;
    z-index: 5;
  }
  .panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .panel h3 { margin: 0 0 12px; font-size: 16px; color: #554943; user-select: none; }
  .control { margin: 10px 0 12px; color: #5c504b; }
  .control label {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: baseline;
    font-size: 13px;
    font-weight: 750;
    margin-bottom: 6px;
  }
  .control output {
    min-width: 74px;
    text-align: right;
    color: #8b7970;
    font-weight: 850;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    width: 100%;
    accent-color: #2f2f2f;
    margin: 0;
  }
  button {
    border: 0;
    border-radius: 12px;
    padding: 10px 12px;
    background: #2f2f2f;
    color: white;
    font-weight: 800;
    cursor: pointer;
  }
  .panel button { margin-top: 8px; width: 100%; }
  .hint { margin: 8px 0 0; font-size: 12px; color: #8b7970; opacity: .82; line-height: 1.45; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud">
  <div class="scoreCard"><small>BEST HEIGHT</small><b id="cm">0.0</b><span>cm</span></div>
</div>
<button class="gear" id="gearBtn" aria-label="開啟設定">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="3.2"></circle>
    <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.04.04a2 2 0 1 1-2.83 2.83l-.04-.04a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.07a1.7 1.7 0 0 0-1.03-1.56 1.7 1.7 0 0 0-1.88.34l-.04.04a2 2 0 1 1-2.83-2.83l.04-.04A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.07A1.7 1.7 0 0 0 4.6 8a1.7 1.7 0 0 0-.34-1.88l-.04-.04a2 2 0 1 1 2.83-2.83l.04.04A1.7 1.7 0 0 0 9 3.6a1.7 1.7 0 0 0 1-1.53V2a2 2 0 1 1 4 0v.07A1.7 1.7 0 0 0 15 3.6a1.7 1.7 0 0 0 1.88-.34l.04-.04a2 2 0 1 1 2.83 2.83l-.04.04A1.7 1.7 0 0 0 19.4 8a1.7 1.7 0 0 0 1.56 1.03H21a2 2 0 1 1 0 4h-.07A1.7 1.7 0 0 0 19.4 15Z"></path>
  </svg>
</button>
<div class="panel" id="panel">
  <h3>後台設定</h3>

  <div class="control"><label><span>左右鍋子水平距離</span><output id="gapXCmVal"></output></label><input id="gapXCm" type="range" min="16" max="60" step="0.5" value="29.2"></div>
  <div class="control"><label><span>每階高度差</span><output id="gapYCmVal"></output></label><input id="gapYCm" type="range" min="8" max="35" step="0.5" value="17.7"></div>
  <div class="control"><label><span>每階加寬距離</span><output id="spreadCmVal"></output></label><input id="spreadCm" type="range" min="0" max="4" step="0.1" value="1.4"></div>
  <div class="control"><label><span>初始鍋子角度</span><output id="restAngleVal"></output></label><input id="restAngle" type="range" min="-25" max="0" step="1" value="-10"></div>
  <div class="control"><label><span>抬起最大角度</span><output id="liftAngleVal"></output></label><input id="liftAngle" type="range" min="0" max="25" step="1" value="10"></div>
  <div class="control"><label><span>抬鍋反應速度</span><output id="panSpeedVal"></output></label><input id="panSpeed" type="range" min="0.03" max="0.35" step="0.01" value="0.18"></div>
  <div class="control"><label><span>拋起力度</span><output id="kickVal"></output></label><input id="kick" type="range" min="2" max="12" step="0.1" value="6.4"></div>
  <div class="control"><label><span>重力</span><output id="gravityVal"></output></label><input id="gravity" type="range" min="0.10" max="0.60" step="0.01" value="0.28"></div>
  <div class="control"><label><span>公分換算</span><output id="pxPerCmVal"></output></label><input id="pxPerCm" type="range" min="8" max="20" step="0.5" value="13"></div>
  <div class="control"><label><span>培根柔軟度</span><output id="softnessVal"></output></label><input id="softness" type="range" min="0.15" max="0.95" step="0.05" value="0.50"></div>
  <div class="control"><label><span>鍋子尺寸</span><output id="panScaleVal"></output></label><input id="panScale" type="range" min="0.60" max="1.40" step="0.05" value="1.00"></div>
  <div class="control"><label><span>手尺寸</span><output id="handScaleVal"></output></label><input id="handScale" type="range" min="0.60" max="1.40" step="0.05" value="1.00"></div>

  <button id="applyBtn">套用並重新開始</button>
  <p class="hint">距離以公分設定，會依「公分換算」轉成畫面像素。距離、尺寸改完建議按套用。</p>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const $ = id => document.getElementById(id);

const HAND_GRIP_X = 35;
const HAND_GRIP_Y = 60;
const BASE_PAN_W = 190;
const BASE_PAN_H = 24;

let W=0,H=0,CW=0,CH=0,playX=0,dpr=1;
let settings={}, pans=[], bacon=null, cameraY=0, bestY=0, started=false, frame=0, activePanIndex=0;
let inputHeld=false;
let hand = {x:-260,targetX:70,y:0,retract:false};

const sliderDefs = [
  ['gapXCm', v => `${Number(v).toFixed(1)} cm`],
  ['gapYCm', v => `${Number(v).toFixed(1)} cm`],
  ['spreadCm', v => `${Number(v).toFixed(1)} cm/階`],
  ['restAngle', v => `${Number(v).toFixed(0)}°`],
  ['liftAngle', v => `${Number(v).toFixed(0)}°`],
  ['panSpeed', v => Number(v).toFixed(2)],
  ['kick', v => Number(v).toFixed(1)],
  ['gravity', v => Number(v).toFixed(2)],
  ['pxPerCm', v => `${Number(v).toFixed(1)} px/cm`],
  ['softness', v => Number(v).toFixed(2)],
  ['panScale', v => `${Math.round(Number(v)*100)}%`],
  ['handScale', v => `${Math.round(Number(v)*100)}%`]
];
function updateSliderDisplays(){
  for(const [id, fmt] of sliderDefs){
    const out = $(id + 'Val');
    if(out) out.textContent = fmt($(id).value);
  }
}
function refreshPanSizes(){
  if(!pans) return;
  for(const p of pans){
    p.w = BASE_PAN_W * settings.panScale;
    p.h = BASE_PAN_H * settings.panScale;
  }
}
function num(id, fallback){
  const v = Number($(id).value);
  return Number.isFinite(v) ? v : fallback;
}
function readSettings(){
  const pxPerCm = num('pxPerCm', 13);
  settings = {
    gapX:num('gapXCm', 29.2) * pxPerCm,
    gapY:num('gapYCm', 17.7) * pxPerCm,
    spread:num('spreadCm', 1.4) * pxPerCm,
    restAngle:num('restAngle', -10)*Math.PI/180,
    liftAngle:num('liftAngle', 10)*Math.PI/180,
    panSpeed:Math.max(0.03, Math.min(0.45, num('panSpeed', 0.18))),
    kick:num('kick', 6.4),
    gravity:num('gravity', 0.28),
    pxPerCm,
    softness:Math.max(0.15, Math.min(0.95, num('softness', 0.50))),
    panScale:Math.max(0.6, Math.min(1.4, num('panScale', 1))),
    handScale:Math.max(0.6, Math.min(1.4, num('handScale', 1)))
  };
  updateSliderDisplays();
  refreshPanSizes();
}
function resize(){
  dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  CW = innerWidth; CH = innerHeight;
  W = Math.min(CW, CH * 9 / 16);
  H = CH;
  playX = (CW - W) / 2;
  canvas.width = CW*dpr;
  canvas.height = CH*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resize);

function reset(){
  readSettings();
  resize();
  pans=[]; bacon=null; started=false; cameraY=0; bestY=0; frame=0; activePanIndex=0; inputHeld=false;
  makePans();
  placeHandAtPan(0);
  updateScore();
}
function makePans(){
  const centerX=W*.50, baseY=H*.76;
  for(let i=0;i<150;i++){
    const side=i%2===0?-1:1;
    const open=settings.gapX+i*settings.spread;
    pans.push({
      x:centerX+side*open/2,
      y:baseY-i*settings.gapY,
      side,
      lift:0,
      prevLift:0,
      liftVel:0,
      w:BASE_PAN_W*settings.panScale,
      h:BASE_PAN_H*settings.panScale,
      hitMemory:0
    });
  }
}
function placeHandAtPan(i){
  i = Math.max(0, Math.min(i, pans.length-1));
  if (pans[i].side === 1 && i > 0) i -= 1;
  const p=pans[i];
  activePanIndex=i;
  const s = settings.handScale;
  hand.targetX = p.x - HAND_GRIP_X * s;
  hand.x = hand.targetX - 270 * s;
  hand.y = p.y - Math.max(215, 285 * s);
  hand.retract = false;
}
function spawnBacon(){
  const s = settings.handScale;
  const x = hand.x + HAND_GRIP_X * s, y = hand.y + HAND_GRIP_Y * s;
  const segs=[]; const n=8; const spacing=14;
  for(let i=0;i<n;i++){
    const yy=y+i*spacing;
    const xx=x+Math.sin(i*.85)*6;
    segs.push({x:xx,y:yy,px:xx-0.7,py:yy-0.3});
  }
  bacon={segs, alive:true};
  started=true;
  hand.retract=true;
}
function pointerDown(e){
  inputHeld=true;
  if(!started) spawnBacon();
}
function pointerUp(){ inputHeld=false; }
canvas.addEventListener('pointerdown', pointerDown);
window.addEventListener('pointerup', pointerUp);
window.addEventListener('pointercancel', pointerUp);
$('gearBtn').onclick = e => { e.stopPropagation(); $('panel').classList.toggle('open'); };
$('panel').addEventListener('pointerdown', e => e.stopPropagation());
$('panel').addEventListener('pointerup', e => e.stopPropagation());
$('applyBtn').onclick = reset;
for(const [id] of sliderDefs){
  $(id).addEventListener('input', () => readSettings());
}

function update(){
  frame++;
  const target=hand.retract?-305:hand.targetX;
  hand.x+=(target-hand.x)*.075;

  const targetLift=inputHeld?1:0;
  for(const p of pans){
    p.prevLift=p.lift;
    p.lift += (targetLift-p.lift)*settings.panSpeed;
    p.liftVel = p.lift-p.prevLift;
    p.hitMemory *= .82;
  }

  if(bacon){
    stepBacon();
    collidePans(true);
    constrainBacon();
    collidePans(false);

    const c=getBaconCenter();
    bestY=Math.min(bestY, c.y-H*.76);
    const targetCam=Math.min(0, c.y-H*.52);
    cameraY+=(targetCam-cameraY)*.08;
    updateScore();
    if(c.y-cameraY>H+170 || c.x<-260 || c.x>W+260) continueFromCurrentLevel();
  }
}
function stepBacon(){
  for(const s of bacon.segs){
    const vx=(s.x-s.px)*.992, vy=(s.y-s.py)*.992;
    s.px=s.x; s.py=s.y;
    s.x+=vx;
    s.y+=vy+settings.gravity;
  }
}
function constrainBacon(){
  const segs=bacon.segs, rest=13;
  for(let k=0;k<9;k++){
    for(let i=0;i<segs.length-1;i++){
      const a=segs[i], b=segs[i+1];
      let dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||1;
      const diff=(d-rest)/d*settings.softness;
      const ox=dx*.5*diff, oy=dy*.5*diff;
      a.x+=ox; a.y+=oy; b.x-=ox; b.y-=oy;
    }
  }
}
function panAngle(p){ return p.side*(settings.restAngle+(settings.liftAngle-settings.restAngle)*p.lift); }
function localToWorld(p, angle, lx, ly){
  const c=Math.cos(angle), s=Math.sin(angle);
  return {x:p.x + lx*c - ly*s, y:p.y + lx*s + ly*c};
}
function collidePans(applyImpulse=true){
  if(!bacon) return;

  for(let pi=0; pi<pans.length; pi++){
    const p=pans[pi], angle=panAngle(p), ca=Math.cos(-angle), sa=Math.sin(-angle);
    const topY = -p.h/2;
    const bottomY = p.h/2;
    const topHits=[];

    for(const s of bacon.segs){
      const dx=s.x-p.x, dy=s.y-p.y;
      const lx=dx*ca-dy*sa, ly=dx*sa+dy*ca;
      const pdx=s.px-p.x, pdy=s.py-p.y;
      const plx=pdx*ca-pdy*sa, ply=pdx*sa+pdy*ca;
      const inX = lx>-p.w/2 && lx<p.w/2;
      const insideBody = inX && ly>topY && ly<bottomY;
      if(!insideBody) continue;

      const localVy = ly - ply;
      const cameFromBelow = ply >= bottomY - 1 || (ly > 0 && localVy < -0.15);
      const cameFromAbove = ply <= topY + 1 || !cameFromBelow;

      if(cameFromBelow){
        // 撞到鍋子底部：推回鍋子下方，並把向上的速度反彈成向下，不給抬鍋衝量。
        const next = localToWorld(p, angle, lx, bottomY + 1.2);
        const bounce = Math.min(9, Math.abs(localVy)*0.35 + 1.1);
        const prev = localToWorld(p, angle, plx, bottomY + 1.2 - bounce);
        s.x = next.x;
        s.y = next.y;
        s.px = prev.x;
        s.py = prev.y;
        continue;
      }

      if(cameFromAbove){
        const next = localToWorld(p, angle, lx, topY - 0.8);
        s.x = next.x;
        s.y = next.y;
        topHits.push(s);
      }
    }

    if(topHits.length>0){
      activePanIndex=Math.max(activePanIndex, pi);
      p.hitMemory = Math.min(1, p.hitMemory + topHits.length*.12);
    }

    if(applyImpulse && topHits.length>0){
      const liftUp = Math.max(0, p.liftVel);
      const contactScale = Math.min(1, 2.5 / topHits.length);
      const upwardVel = liftUp * settings.kick * 34 * contactScale;
      const sideVel = p.side * liftUp * settings.kick * 10 * contactScale;
      const settle = Math.max(0, p.lift) * 0.16;

      for(const s of topHits){
        s.py = Math.max(s.py, s.y + upwardVel + settle);
        s.px += sideVel;
      }
    }
  }
}
function getBaconCenter(){
  let x=0,y=0;
  for(const s of bacon.segs){x+=s.x;y+=s.y;}
  return {x:x/bacon.segs.length,y:y/bacon.segs.length};
}
function continueFromCurrentLevel(){
  let idx=activePanIndex;
  if(pans[idx] && pans[idx].side===1) idx=Math.max(0, idx-1);
  while(idx>0 && pans[idx].side!==-1) idx--;
  bacon=null;
  started=false;
  inputHeld=false;
  placeHandAtPan(idx);
  const targetCam=Math.min(0, pans[idx].y-H*.66);
  cameraY += (targetCam-cameraY)*.35;
}
function updateScore(){ $('cm').textContent=(Math.max(0,-bestY/settings.pxPerCm)).toFixed(1); }

function draw(){
  ctx.clearRect(0,0,CW,CH);
  drawBg();
  ctx.save();
  ctx.translate(playX,0);
  ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  ctx.translate(0,-cameraY);
  drawGuideLine();
  for(const p of pans) if(p.y-cameraY>-160 && p.y-cameraY<H+180) drawPan(p);
  if(!started) drawHand();
  if(bacon) drawBacon();
  ctx.restore();
  drawPlayAreaShade();
}
function drawBg(){
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#f1d2cc');
  g.addColorStop(.55,'#f8e7e2');
  g.addColorStop(1,'#fdeee7');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,CW,CH);
  ctx.globalAlpha=.16;
  for(let i=0;i<13;i++){
    ctx.fillStyle=i%2?'#fff':'#e9aaa2';
    ctx.beginPath();
    ctx.ellipse((i*137+frame*.12)%CW,90+i*70,170,28,-.08,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawPlayAreaShade(){
  if(playX<=1) return;
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.fillRect(playX,0,W,H);
}
function drawGuideLine(){
  ctx.fillStyle='rgba(255,255,255,.88)';
  for(let x=0;x<W;x+=22){ ctx.beginPath(); ctx.arc(x,H*.43,2.6,0,Math.PI*2); ctx.fill(); }
}
function drawPan(p){
  const angle=panAngle(p);
  ctx.save();
  ctx.translate(p.x,p.y);
  ctx.rotate(angle);

  const topW = p.w;
  const bottomW = p.w * 0.72;
  const topY = -p.h/2;
  const bottomY = p.h/2;
  const handleLen = 90 * settings.panScale;
  const gripLen = 30 * settings.panScale;
  const handleH = 10 * settings.panScale;

  if (p.side === -1) {
    ctx.fillStyle = '#303030';
    ctx.fillRect(-topW/2 - handleLen, topY, handleLen, handleH);
    ctx.fillStyle = '#d6a04a';
    ctx.fillRect(-topW/2 - handleLen - gripLen, topY, gripLen, handleH);
  } else {
    ctx.fillStyle = '#303030';
    ctx.fillRect(topW/2, topY, handleLen, handleH);
    ctx.fillStyle = '#d6a04a';
    ctx.fillRect(topW/2 + handleLen, topY, gripLen, handleH);
  }

  ctx.fillStyle = '#303030';
  ctx.beginPath();
  ctx.moveTo(-topW/2, topY);
  ctx.lineTo(topW/2, topY);
  ctx.lineTo(bottomW/2, bottomY);
  ctx.lineTo(-bottomW/2, bottomY);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}
function drawHand(){
  ctx.save();
  ctx.translate(hand.x,hand.y);
  ctx.scale(settings.handScale, settings.handScale);

  ctx.fillStyle = '#f5b597';
  ctx.fillRect(-180, -5, 180, 26);

  ctx.fillStyle = '#303030';
  ctx.beginPath();
  ctx.moveTo(-180, -10);
  ctx.lineTo(-80, -5);
  ctx.lineTo(-80, 26);
  ctx.lineTo(-180, 21);
  ctx.fill();

  ctx.fillStyle = '#f5b597';
  ctx.beginPath();
  ctx.moveTo(0, -5);
  ctx.lineTo(35, 5);
  ctx.lineTo(85, 18);
  ctx.lineTo(82, 32);
  ctx.lineTo(58, 28);
  ctx.lineTo(53, 75);
  ctx.lineTo(38, 75);
  ctx.lineTo(35, 45);
  ctx.lineTo(25, 75);
  ctx.lineTo(10, 68);
  ctx.lineTo(20, 21);
  ctx.closePath();
  ctx.fill();

  drawHeldBacon(HAND_GRIP_X, HAND_GRIP_Y);

  ctx.restore();
}
function drawHeldBacon(x,y){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(-0.1);
  ctx.lineCap='butt'; ctx.lineJoin='miter';
  for(let strip=0; strip<2; strip++){
    ctx.lineWidth=12;
    ctx.strokeStyle=strip?'#f7ddd3':'#df8480';
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const px=(strip?6:-6)+Math.sin(i*.5+strip)*2;
      const py=i*16;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
  }
  ctx.restore();
}
function drawBacon(){
  const segs=bacon.segs;
  for(let strip=0; strip<2; strip++){
    ctx.lineWidth=14;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    ctx.strokeStyle=strip?'#f7ddd3':'#df8480';
    ctx.beginPath();
    for(let i=0;i<segs.length;i++){
      const s=segs[i];
      let nx=0, ny=0;
      if(i<segs.length-1){ const n=segs[i+1]; nx=n.y-s.y; ny=-(n.x-s.x); }
      else { const n=segs[i-1]; nx=s.y-n.y; ny=-(s.x-n.x); }
      const l=Math.hypot(nx,ny)||1; nx/=l; ny/=l;
      const offset = strip ? 6 : -6;
      const x=s.x+nx*offset, y=s.y+ny*offset;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
}
function loop(){ update(); draw(); requestAnimationFrame(loop); }
reset();
loop();
</script>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Bacon Trainer</title>
<link rel="apple-touch-icon" sizes="180x180" href="./icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Bacon Trainer" />
<style>
  * {
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f7ded8;
    touch-action: none;
    overscroll-behavior: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
    cursor: pointer;
  }
  .hud {
    position: fixed;
    inset: 12px 12px auto 12px;
    display: flex;
    justify-content: flex-end;
    pointer-events: none;
    color: #7a6d66;
    z-index: 2;
  }
  .scoreCard {
    min-width: 124px;
    padding: 9px 13px;
    border: 3px solid rgba(255,255,255,.86);
    background: rgba(255,255,255,.62);
    border-radius: 18px;
    text-align: center;
    backdrop-filter: blur(4px);
    box-shadow: 0 8px 24px rgba(180,120,110,.12);
  }
  .scoreCard small { display: block; font-weight: 800; opacity: .52; letter-spacing: .04em; }
  .scoreCard b { font-size: 31px; line-height: 1.05; font-family: Georgia, serif; color: #8b7970; }
  .scoreCard span { display: block; font-size: 13px; font-weight: 800; opacity: .62; }

  .gear {
    position: fixed;
    right: 14px;
    bottom: 14px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 0;
    margin: 0;
    padding: 0;
    display: grid;
    place-items: center;
    background: rgba(47,47,47,.94);
    color: white;
    z-index: 6;
    box-shadow: 0 12px 30px rgba(80,40,40,.22);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .gear svg { width: 25px; height: 25px; display: block; }
  .gear:active { transform: translateY(1px) scale(.98); }

  .panel {
    position: fixed;
    right: 12px;
    bottom: 72px;
    width: min(390px, calc(100vw - 24px));
    max-height: calc(100vh - 96px);
    overflow: auto;
    background: rgba(255,255,255,.94);
    border: 1px solid rgba(255,255,255,.9);
    border-radius: 18px;
    padding: 14px;
    box-shadow: 0 18px 45px rgba(80,40,40,.18);
    transform: translateY(18px);
    opacity: 0;
    pointer-events: none;
    transition: .18s;
    z-index: 5;
  }
  .panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .panel h3 { margin: 0 0 12px; font-size: 16px; color: #554943; }
  .sectionTitle { margin: 14px 0 8px; font-size: 12px; font-weight: 900; color: #8b7970; letter-spacing: .08em; opacity: .85; }
  .control { margin: 10px 0 12px; color: #5c504b; }
  .control label {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: baseline;
    font-size: 13px;
    font-weight: 750;
    margin-bottom: 6px;
  }
  .control output {
    min-width: 82px;
    text-align: right;
    color: #8b7970;
    font-weight: 850;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    width: 100%;
    accent-color: #2f2f2f;
    margin: 0;
  }
  .control select {
    width: 100%;
    margin: 0;
    padding: 9px 10px;
    border-radius: 10px;
    border: 1px solid rgba(120,100,96,.18);
    background: #fff;
    color: #554943;
    font-weight: 700;
  }
  button {
    border: 0;
    border-radius: 12px;
    padding: 10px 12px;
    background: #2f2f2f;
    color: white;
    font-weight: 800;
    cursor: pointer;
  }
  .panel button { margin-top: 8px; width: 100%; }
  .hint { margin: 8px 0 0; font-size: 12px; color: #8b7970; opacity: .82; line-height: 1.45; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <div class="scoreCard"><small>BEST HEIGHT</small><b id="cm">0.0</b><span>cm</span></div>
</div>

<button class="gear" id="gearBtn" aria-label="開啟設定">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="3.2"></circle>
    <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.04.04a2 2 0 1 1-2.83 2.83l-.04-.04a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.07a1.7 1.7 0 0 0-1.03-1.56 1.7 1.7 0 0 0-1.88.34l-.04.04a2 2 0 1 1-2.83-2.83l.04-.04A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.07A1.7 1.7 0 0 0 4.6 8a1.7 1.7 0 0 0-.34-1.88l-.04-.04a2 2 0 1 1 2.83-2.83l.04.04A1.7 1.7 0 0 0 9 3.6a1.7 1.7 0 0 0 1-1.53V2a2 2 0 1 1 4 0v.07A1.7 1.7 0 0 0 15 3.6a1.7 1.7 0 0 0 1.88-.34l.04-.04a2 2 0 1 1 2.83 2.83l-.04.04A1.7 1.7 0 0 0 19.4 8a1.7 1.7 0 0 0 1.56 1.03H21a2 2 0 1 1 0 4h-.07A1.7 1.7 0 0 0 19.4 15Z"></path>
  </svg>
</button>

<div class="panel" id="panel">
  <h3>後台設定</h3>

  <div class="sectionTitle">主題</div>
  <div class="control"><label><span>主題</span><output id="themeVal"></output></label><select id="theme"><option value="pan">平底鍋 / 培根</option><option value="spatula">鍋鏟 / 荷包蛋</option></select></div>

  <div class="sectionTitle">關卡 / 節奏</div>
  <div class="control"><label><span>左右鍋子水平距離</span><output id="gapXCmVal"></output></label><input id="gapXCm" type="range" min="8" max="24" step="0.5" value="16"></div>
  <div class="control"><label><span>每階高度差</span><output id="gapYCmVal"></output></label><input id="gapYCm" type="range" min="10" max="25" step="0.5" value="17.7"></div>
  <div class="control"><label><span>每階加寬距離</span><output id="spreadCmVal"></output></label><input id="spreadCm" type="range" min="0" max="3" step="0.1" value="1.4"></div>
  <div class="control"><label><span>公分換算</span><output id="pxPerCmVal"></output></label><input id="pxPerCm" type="range" min="8" max="20" step="0.5" value="13"></div>

  <div class="sectionTitle">鍋子 / 鍋鏟</div>
  <div class="control"><label><span>器具長度</span><output id="panLengthVal"></output></label><input id="panLength" type="range" min="0.55" max="1.15" step="0.05" value="0.85"></div>
  <div class="control"><label><span>器具尺寸</span><output id="panScaleVal"></output></label><input id="panScale" type="range" min="0.60" max="1.00" step="0.05" value="0.80"></div>
  <div class="control"><label><span>碰撞層長度</span><output id="collisionLengthVal"></output></label><input id="collisionLength" type="range" min="1.00" max="1.80" step="0.05" value="1.05"></div>
  <div class="control"><label><span>轉軸位置</span><output id="pivotPosVal"></output></label><input id="pivotPos" type="range" min="0.00" max="1.00" step="0.05" value="0.50"></div>
  <div class="control"><label><span>垂下角度</span><output id="restAngleVal"></output></label><input id="restAngle" type="range" min="-30" max="30" step="1" value="12"></div>
  <div class="control"><label><span>抬起角度</span><output id="liftAngleVal"></output></label><input id="liftAngle" type="range" min="-30" max="30" step="1" value="-12"></div>
  <div class="control"><label><span>抬鍋反應速度</span><output id="panSpeedVal"></output></label><input id="panSpeed" type="range" min="0.04" max="3.00" step="0.01" value="0.15"></div>

  <div class="sectionTitle">食材 / 物理</div>
  <div class="control"><label><span>食材尺寸</span><output id="baconScaleVal"></output></label><input id="baconScale" type="range" min="0.50" max="1.20" step="0.05" value="0.80"></div>
  <div class="control"><label><span>剛性</span><output id="stiffnessVal"></output></label><input id="stiffness" type="range" min="0.40" max="1.60" step="0.05" value="1.00"></div>
  <div class="control"><label><span>節點數</span><output id="baconSegmentsVal"></output></label><input id="baconSegments" type="range" min="6" max="12" step="1" value="8"></div>
  <div class="control"><label><span>節點間距</span><output id="baconSpacingVal"></output></label><input id="baconSpacing" type="range" min="9" max="17" step="0.5" value="13"></div>
  <div class="control"><label><span>重力</span><output id="gravityVal"></output></label><input id="gravity" type="range" min="0.80" max="3.00" step="0.05" value="1.30"></div>
  <div class="control"><label><span>下落速度</span><output id="fallSpeedVal"></output></label><input id="fallSpeed" type="range" min="2.20" max="8.00" step="0.05" value="5.70"></div>
  <div class="control"><label><span>鍋面滑度</span><output id="slidePowerVal"></output></label><input id="slidePower" type="range" min="0" max="6" step="0.1" value="5.3"></div>
  <div class="control"><label><span>拋起力度</span><output id="kickVal"></output></label><input id="kick" type="range" min="1" max="18" step="0.1" value="6.2"></div>
  <div class="control"><label><span>翻轉加速度</span><output id="spinPowerVal"></output></label><input id="spinPower" type="range" min="0" max="0.08" step="0.005" value="0.030"></div>
  <div class="control"><label><span>防穿透精度</span><output id="physicsStepsVal"></output></label><input id="physicsSteps" type="range" min="2" max="5" step="1" value="3"></div>
  <div class="control"><label><span>手尺寸</span><output id="handScaleVal"></output></label><input id="handScale" type="range" min="0.60" max="1.00" step="0.05" value="0.80"></div>

  <button id="applyBtn">套用並重新開始</button>
  <p class="hint">現在的拋起速度會依接觸點與轉軸的距離自動改變：越遠處的鍋面線速度越大，理論上拋起也越強。主題只改外觀，不改物理。</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const $ = id => document.getElementById(id);

const HAND_GRIP_X = 35;
const HAND_GRIP_Y = 60;
const BASE_PAN_W = 190;
const BASE_PAN_H = 26.4;
const PAN_COUNT = 20;

let MatterRef = null;
let Engine, World, Bodies, Body, Composite, Constraint, Vector;

let engine, world;
let W=0,H=0,CW=0,CH=0,playX=0,dpr=1;
let settings={}, pans=[], baconBodies=[], baconConstraints=[], baconComposite=null;
let cameraY=0, bestY=0, started=false, frame=0, activePanIndex=0;
let inputHeld=false;
let hand = {x:-260,targetX:70,y:0,retract:false};
let lastTime = performance.now();

const sliderDefs = [
  ['theme', v => v === 'spatula' ? '鍋鏟 / 荷包蛋' : '平底鍋 / 培根'],
  ['gapXCm', v => `${Number(v).toFixed(1)} cm`],
  ['gapYCm', v => `${Number(v).toFixed(1)} cm`],
  ['spreadCm', v => `${Number(v).toFixed(1)} cm/階`],
  ['pxPerCm', v => `${Number(v).toFixed(1)} px/cm`],
  ['panLength', v => `${Math.round(Number(v)*100)}%`],
  ['panScale', v => `${Math.round(Number(v)*100)}%`],
  ['collisionLength', v => `${Math.round(Number(v)*100)}%`],
  ['pivotPos', v => `${Math.round(Number(v)*100)}%`],
  ['restAngle', v => `${Number(v).toFixed(0)}°`],
  ['liftAngle', v => `${Number(v).toFixed(0)}°`],
  ['panSpeed', v => Number(v).toFixed(2)],
  ['baconScale', v => `${Math.round(Number(v)*100)}%`],
  ['stiffness', v => Number(v).toFixed(2)],
  ['baconSegments', v => `${Number(v).toFixed(0)} 個`],
  ['baconSpacing', v => `${Number(v).toFixed(1)} px`],
  ['gravity', v => Number(v).toFixed(2)],
  ['fallSpeed', v => `${Number(v).toFixed(2)}×`],
  ['slidePower', v => Number(v).toFixed(1)],
  ['kick', v => Number(v).toFixed(1)],
  ['spinPower', v => Number(v).toFixed(3)],
  ['physicsSteps', v => `${Number(v).toFixed(0)}×`],
  ['handScale', v => `${Math.round(Number(v)*100)}%`]
];

const STORAGE_KEY = 'baconTrainerSettingsV2';

function saveSettings(){
  try{
    const data = {};
    for(const [id] of sliderDefs){
      const el = $(id);
      if(el) data[id] = el.value;
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }catch(err){
    // localStorage 可能在某些隱私模式被瀏覽器阻擋，遊戲仍可正常玩。
  }
}

function loadSavedSettings(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    for(const [id] of sliderDefs){
      const el = $(id);
      if(el && data[id] !== undefined) el.value = data[id];
    }
  }catch(err){
    localStorage.removeItem(STORAGE_KEY);
  }
}

function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
function lerp(a,b,t){ return a+(b-a)*t; }
function num(id, fallback){
  const v = Number($(id).value);
  return Number.isFinite(v) ? v : fallback;
}
function updateSliderDisplays(){
  for(const [id, fmt] of sliderDefs){
    const out = $(id + 'Val');
    if(out) out.textContent = fmt($(id).value);
  }
}
function readSettings(){
  const pxPerCm = num('pxPerCm', 13);
  settings = {
    theme: $('theme').value || 'pan',
    gapX:num('gapXCm', 16) * pxPerCm,
    gapY:num('gapYCm', 17.7) * pxPerCm,
    spread:num('spreadCm', 1.4) * pxPerCm,
    pxPerCm,
    panLength:clamp(num('panLength', 0.85), 0.55, 1.15),
    panScale:clamp(num('panScale', 0.8), 0.6, 1.0),
    collisionLength:clamp(num('collisionLength', 1.05), 1.00, 1.80),
    pivotPos:clamp(num('pivotPos', 0.50), 0.00, 1.00),
    restAngle:num('restAngle', 12)*Math.PI/180,
    liftAngle:num('liftAngle', -12)*Math.PI/180,
    panSpeed:clamp(num('panSpeed', 0.15), 0.03, 3.00),
    baconScale:clamp(num('baconScale', 0.80), 0.50, 1.20),
    stiffness:clamp(num('stiffness', 1.00), 0.40, 1.60),
    baconSegments:Math.round(clamp(num('baconSegments', 8), 6, 12)),
    baconSpacing:clamp(num('baconSpacing', 13), 9, 17),
    gravity:clamp(num('gravity', 1.30), 0.80, 3.00),
    fallSpeed:clamp(num('fallSpeed', 5.70), 2.2, 8.0),
    slidePower:clamp(num('slidePower', 5.3), 0, 6),
    kick:clamp(num('kick', 6.2), 1, 18),
    spinPower:clamp(num('spinPower', 0.030), 0, 0.08),
    physicsSteps:Math.round(clamp(num('physicsSteps', 3), 2, 5)),
    handScale:clamp(num('handScale', 0.8), 0.6, 1.0)
  };
  updateSliderDisplays();
  if(engine) engine.gravity.y = settings.gravity * settings.fallSpeed;
}
function resize(){
  dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  CW = innerWidth; CH = innerHeight;
  W = Math.min(CW, CH * 9 / 16);
  H = CH;
  playX = (CW - W) / 2;
  canvas.width = CW*dpr;
  canvas.height = CH*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', () => {
  resize();
});

function initMatter(){
  MatterRef = window.Matter;
  if(!MatterRef){
    ctx.fillStyle = '#2f2f2f';
    ctx.font = '16px sans-serif';
    ctx.fillText('Matter.js 載入失敗，請確認網路或 CDN。', 20, 40);
    return false;
  }
  ({Engine, World, Bodies, Body, Composite, Constraint, Vector} = MatterRef);
  engine = Engine.create({ enableSleeping: false });
  engine.positionIterations = 10;
  engine.velocityIterations = 8;
  engine.constraintIterations = 4;
  world = engine.world;
  engine.gravity.x = 0;
  engine.gravity.y = settings.gravity * settings.fallSpeed;
  engine.gravity.scale = 0.001;
  return true;
}

function clearWorld(){
  if(!world) return;
  Composite.clear(world, false, true);
  baconBodies=[];
  baconConstraints=[];
  baconComposite=null;
}
function reset(){
  readSettings();
  resize();
  if(!engine && !initMatter()) return;
  clearWorld();
  pans=[]; started=false; cameraY=0; bestY=0; frame=0; activePanIndex=0; inputHeld=false;
  makePans();
  placeHandAtPan(0);
  updatePanBodies();
  updateScore();
}
function makePans(){
  const centerX=W*.50, baseY=H*.76;
  for(let i=0;i<PAN_COUNT;i++){
    const side=i%2===0?-1:1;
    const open=settings.gapX+i*settings.spread;
    const w=BASE_PAN_W*settings.panScale*settings.panLength;
    const h=BASE_PAN_H*settings.panScale;
    const body = Bodies.rectangle(0, 0, w*settings.collisionLength, Math.max(9, h*0.48), {
      isStatic: true,
      friction: clamp(0.24 - settings.slidePower * 0.035, 0.015, 0.24),
      frictionStatic: clamp(0.08 - settings.slidePower * 0.012, 0, 0.08),
      restitution: 0.005,
      slop: 0.01,
      label: 'pan'
    });
    body.render.visible = false;
    World.add(world, body);
    pans.push({
      x:centerX+side*open/2,
      y:baseY-i*settings.gapY,
      side,
      lift:0,
      prevLift:0,
      liftVel:0,
      angle:0,
      prevAngle:0,
      angVel:0,
      w,h,body,
      hitMemory:0
    });
  }
}
function panAngle(p){
  // 角度邏輯：localAngle > 0 代表鍋面往下垂；localAngle < 0 代表往上抬。
  // 左右鍋子用 side 鏡射，所以同一個 +12° 會讓兩邊都往下垂。
  const localAngle = lerp(settings.restAngle, settings.liftAngle, p.lift);
  return -p.side * localAngle;
}
function panHandleLen(){
  return 62 * settings.panScale;
}
function panPivotOffset(){
  return panHandleLen() * settings.pivotPos;
}
function panJoint(p){
  // 0 = 靠近鍋身，1 = 靠近握把末端。
  return { x: p.x + p.side * (p.w / 2 + panPivotOffset()), y: p.y };
}
function panDishCenter(p, angle){
  const joint = panJoint(p);
  const localX = -p.side * (p.w / 2 + panPivotOffset());
  const c=Math.cos(angle), s=Math.sin(angle);
  return { x: joint.x + localX*c, y: joint.y + localX*s };
}
function panCollisionCenter(p, angle){
  const dish = panDishCenter(p, angle);
  const thickness = p.h * 0.82;
  const topY = -thickness / 2;
  const physH = Math.max(9, p.h * 0.48);
  // Matter 的矩形碰撞中心往下放，讓碰撞上表面剛好對齊黑色鍋子的上緣。
  // 碰撞體變厚後比較不會穿透，但培根仍會停在視覺鍋面上方。
  const localY = topY + physH / 2;
  const c=Math.cos(angle), s=Math.sin(angle);
  return { x: dish.x - localY*s, y: dish.y + localY*c };
}
function worldToPanLocal(p, x, y){
  const angle = panAngle(p);
  const c=Math.cos(-angle), s=Math.sin(-angle);
  const center = panDishCenter(p, angle);
  const dx=x-center.x, dy=y-center.y;
  return {x:dx*c-dy*s, y:dx*s+dy*c};
}
function updatePanBodies(){
  for(const p of pans){
    const angle = (typeof p.angle === 'number') ? p.angle : panAngle(p);
    const c = panCollisionCenter(p, angle);
    Body.setPosition(p.body, c);
    Body.setAngle(p.body, angle);
  }
}
function pointVelocityFromPan(p, worldPoint){
  const joint = panJoint(p);
  const rx = worldPoint.x - joint.x;
  const ry = worldPoint.y - joint.y;
  const w = (p.angVel || 0) * 1.15;
  return { x: -w * ry, y: w * rx };
}

function placeHandAtPan(i){
  i = Math.max(0, Math.min(i, pans.length-1));
  if (pans[i].side === 1 && i > 0) i -= 1;
  const p=pans[i];
  activePanIndex=i;
  const s = settings.handScale;
  hand.targetX = p.x - HAND_GRIP_X * s;
  hand.x = hand.targetX - 270 * s;
  hand.y = p.y - Math.max(180, 245 * s);
  hand.retract = false;
}
function removeBacon(){
  if(baconComposite){
    Composite.remove(world, baconComposite);
  }
  baconBodies=[];
  baconConstraints=[];
  baconComposite=null;
}
function spawnBacon(){
  removeBacon();
  const s = settings.handScale;
  const b = settings.baconScale;
  const x = hand.x + HAND_GRIP_X * s;
  const y = hand.y + HAND_GRIP_Y * s;

  const n = settings.baconSegments;
  const radius = 6.2 * b;
  const spacing = settings.baconSpacing * b;
  const group = Body.nextGroup(true);
  const stiff = settings.stiffness;
  const adjacentStiff = clamp(0.995 * stiff, 0.35, 0.999);
  const bendStiff = clamp(0.84 * stiff, 0.05, 0.98);
  const longBendStiff = clamp(0.44 * stiff, 0.02, 0.85);
  const damping = clamp(0.18 / Math.sqrt(stiff), 0.08, 0.34);

  baconComposite = Composite.create({ label: 'bacon' });

  for(let i=0;i<n;i++){
    const t = i/(n-1);
    const bx = x + Math.sin(t*Math.PI*2.1)*3.2*b;
    const by = y + i*spacing;
    const body = Bodies.circle(bx, by, radius, {
      label: 'bacon',
      collisionFilter: { group },
      friction: clamp(0.20 - settings.slidePower * 0.030, 0.010, 0.20),
      frictionStatic: clamp(0.06 - settings.slidePower * 0.010, 0, 0.06),
      frictionAir: 0.004,
      restitution: 0.018,
      slop: 0.01,
      density: 0.0015
    });
    baconBodies.push(body);
    Composite.add(baconComposite, body);
  }

  for(let i=0;i<n-1;i++){
    const c = Constraint.create({
      bodyA:baconBodies[i],
      bodyB:baconBodies[i+1],
      length:spacing,
      stiffness:adjacentStiff,
      damping
    });
    baconConstraints.push(c);
    Composite.add(baconComposite, c);
  }
  for(let i=0;i<n-2;i++){
    const c = Constraint.create({
      bodyA:baconBodies[i],
      bodyB:baconBodies[i+2],
      length:spacing*2,
      stiffness:bendStiff,
      damping:damping*0.55
    });
    baconConstraints.push(c);
    Composite.add(baconComposite, c);
  }
  // 多加一層長距離約束，讓培根比較像一整片，不會像鬆散的繩子。
  for(let i=0;i<n-3;i++){
    const c = Constraint.create({
      bodyA:baconBodies[i],
      bodyB:baconBodies[i+3],
      length:spacing*3,
      stiffness:longBendStiff,
      damping:damping*0.38
    });
    baconConstraints.push(c);
    Composite.add(baconComposite, c);
  }

  World.add(world, baconComposite);
  started=true;
  hand.retract=true;
}
function pointerDown(e){
  e.preventDefault();
  inputHeld=true;
  if(!started) spawnBacon();
}
function pointerUp(e){
  if(e) e.preventDefault();
  inputHeld=false;
}
canvas.addEventListener('pointerdown', pointerDown, {passive:false});
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('touchstart', e => e.preventDefault(), {passive:false});
window.addEventListener('pointerup', pointerUp, {passive:false});
window.addEventListener('pointercancel', pointerUp, {passive:false});
window.addEventListener('gesturestart', e => e.preventDefault());

$('gearBtn').onclick = e => { e.stopPropagation(); $('panel').classList.toggle('open'); };
$('panel').addEventListener('pointerdown', e => e.stopPropagation());
$('panel').addEventListener('pointerup', e => e.stopPropagation());
$('applyBtn').onclick = () => {
  saveSettings();
  reset();
};
for(const [id] of sliderDefs){
  $(id).addEventListener('input', () => {
    readSettings();
    saveSettings();
  });
  $(id).addEventListener('change', () => {
    readSettings();
    saveSettings();
  });
}

function getBaconCenter(){
  if(!baconBodies.length) return {x:0,y:0};
  let x=0,y=0;
  for(const b of baconBodies){x+=b.position.x;y+=b.position.y;}
  return {x:x/baconBodies.length,y:y/baconBodies.length};
}
function applyPanImpulses(){
  if(!baconBodies.length) return;

  for(let pi=0; pi<pans.length; pi++){
    const p = pans[pi];
    const liftUp = Math.max(0, p.liftVel);
    if(liftUp <= 0.0008 || Math.abs(p.angVel) <= 0.0006) continue;

    const angle = (typeof p.angle === 'number') ? p.angle : panAngle(p);
    const physW = p.w * settings.collisionLength;
    const thickness = p.h * 0.82;
    const topY = -thickness / 2;
    const physH = Math.max(9, p.h * 0.48);
    const safeEdge = 6 * settings.panScale;
    const hits = [];

    const normal = { x: Math.sin(angle), y: -Math.cos(angle) };
    const tangent = { x: Math.cos(angle), y: Math.sin(angle) };
    const targetDir = -p.side;
    if(normal.x * targetDir < 0) normal.x *= -1;

    for(const b of baconBodies){
      const loc = worldToPanLocal(p, b.position.x, b.position.y);
      const inX = loc.x > -physW/2 + safeEdge && loc.x < physW/2 - safeEdge;
      const nearTop = loc.y > topY - 24*settings.baconScale && loc.y < topY + physH + 16*settings.baconScale;
      if(inX && nearTop) hits.push({body:b, loc});
    }

    if(hits.length < 1) continue;
    activePanIndex = Math.max(activePanIndex, pi);

    const transfer = 0.88 + settings.kick * 0.085;
    const tangentFollow = clamp(0.30 + settings.kick * 0.035, 0.25, 0.95);

    for(const hit of hits){
      const b = hit.body;
      const pv = pointVelocityFromPan(p, b.position);
      const bv = b.velocity;
      const vnBody = bv.x * normal.x + bv.y * normal.y;
      const vtBody = bv.x * tangent.x + bv.y * tangent.y;
      const vnPan = Math.max(0, pv.x * normal.x + pv.y * normal.y) * transfer;
      const vtPan = (pv.x * tangent.x + pv.y * tangent.y) * tangentFollow;

      let newVN = vnBody;
      if(vnPan > vnBody) newVN = vnPan;
      let newVT = vtBody + (vtPan - vtBody) * 0.72;

      const distRatio = clamp(Math.hypot(b.position.x - panJoint(p).x, b.position.y - panJoint(p).y) / Math.max(1, p.w), 0.15, 1.6);
      newVT += targetDir * settings.spinPower * 120 * distRatio * Math.max(0.2, liftUp * 20);

      Body.setVelocity(b, {
        x: clamp(normal.x * newVN + tangent.x * newVT, -42, 42),
        y: clamp(normal.y * newVN + tangent.y * newVT, -46, 46)
      });
    }
  }
}

function stabilizeBaconOnPans(){
  if(!baconBodies.length) return;

  for(const p of pans){
    const angle = panAngle(p);
    const physW = p.w * settings.collisionLength;
    const thickness = p.h * 0.82;
    const topY = -thickness / 2;
    const physH = Math.max(9, p.h * 0.48);
    const radius = 6.2 * settings.baconScale;
    const slide01 = settings.slidePower / 6;
    const gravityAlong = engine.gravity.y * Math.sin(angle) * settings.slidePower * 0.006;
    const tangentKeep = 0.34 + slide01 * 0.62;

    const c=Math.cos(angle), s=Math.sin(angle);

    for(const b of baconBodies){
      const loc = worldToPanLocal(p, b.position.x, b.position.y);
      if(loc.x < -physW/2 - radius || loc.x > physW/2 + radius) continue;

      const targetY = topY - radius;
      const mayTouchTop = loc.y > targetY && loc.y < topY + physH + radius * 2.2;
      if(!mayTouchTop) continue;

      const vLocalX = b.velocity.x * c + b.velocity.y * s;
      const vLocalY = -b.velocity.x * s + b.velocity.y * c;

      const newLocalY = targetY;
      const dish = panDishCenter(p, angle);
      const newWorldX = dish.x + loc.x*c - newLocalY*s;
      const newWorldY = dish.y + loc.x*s + newLocalY*c;

      const newVLocalX = clamp(vLocalX * tangentKeep + gravityAlong, -26, 26);
      const newVLocalY = Math.min(0, vLocalY * 0.08);
      const newVx = newVLocalX*c - newVLocalY*s;
      const newVy = newVLocalX*s + newVLocalY*c;

      Body.setPosition(b, {x:newWorldX, y:newWorldY});
      Body.setVelocity(b, {x:newVx, y:newVy});
    }
  }
}

function update(dt){
  frame++;

  const target=hand.retract?-305:hand.targetX;
  hand.x+=(target-hand.x)*.075;

  const targetLift=inputHeld?1:0;
  const panResponse = clamp(1 - Math.exp(-settings.panSpeed), 0.01, 0.96);
  for(const p of pans){
    p.prevLift = p.lift;
    p.prevAngle = (typeof p.angle === 'number') ? p.angle : panAngle(p);
    p.lift += (targetLift-p.lift)*panResponse;
    p.liftVel = p.lift-p.prevLift;
    p.angle = panAngle(p);
    p.angVel = p.angle - p.prevAngle;
    p.hitMemory *= .82;
  }
  updatePanBodies();

  applyPanImpulses();

  // 物理小步進：數值越高越不容易穿透，但越吃效能。
  const substeps = settings.physicsSteps;
  for(let i=0; i<substeps; i++){
    Engine.update(engine, dt / substeps);
    stabilizeBaconOnPans();
  }

  if(baconBodies.length){
    const c=getBaconCenter();
    bestY=Math.min(bestY, c.y-H*.76);
    const targetCam=Math.min(0, c.y-H*.52);
    cameraY+=(targetCam-cameraY)*.08;
    updateScore();

    if(c.y-cameraY>H+170 || c.x<-260 || c.x>W+260) continueFromCurrentLevel();
  }
}
function continueFromCurrentLevel(){
  let idx=activePanIndex;
  if(pans[idx] && pans[idx].side===1) idx=Math.max(0, idx-1);
  while(idx>0 && pans[idx].side!==-1) idx--;
  removeBacon();
  started=false;
  inputHeld=false;
  placeHandAtPan(idx);
  const targetCam=Math.min(0, pans[idx].y-H*.66);
  cameraY += (targetCam-cameraY)*.35;
}
function updateScore(){ $('cm').textContent=(Math.max(0,-bestY/settings.pxPerCm)).toFixed(1); }

function draw(){
  ctx.clearRect(0,0,CW,CH);
  drawBg();
  ctx.save();
  ctx.translate(playX,0);
  ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  ctx.translate(0,-cameraY);
  drawGuideLine();
  for(const p of pans) if(p.y-cameraY>-160 && p.y-cameraY<H+180) drawPan(p);
  if(!started) drawHand();
  if(baconBodies.length) drawBacon();
  ctx.restore();
  drawPlayAreaShade();
}
function drawBg(){
  const theme = settings.theme || 'pan';
  const g=ctx.createLinearGradient(0,0,0,CH);
  if(theme === 'spatula'){
    g.addColorStop(0,'#bde5dd');
    g.addColorStop(.55,'#d6f1eb');
    g.addColorStop(1,'#e9faf7');
  }else{
    g.addColorStop(0,'#f1d2cc');
    g.addColorStop(.55,'#f8e7e2');
    g.addColorStop(1,'#fdeee7');
  }
  ctx.fillStyle=g;
  ctx.fillRect(0,0,CW,CH);
  ctx.globalAlpha=.16;
  for(let i=0;i<13;i++){
    ctx.fillStyle=theme === 'spatula' ? (i%2?'#ffffff':'#8ed0c5') : (i%2?'#fff':'#e9aaa2');
    ctx.beginPath();
    ctx.ellipse((i*137+frame*.12)%CW,90+i*70,170,28,-.08,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawPlayAreaShade(){
  if(playX<=1) return;
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.fillRect(playX,0,W,H);
}
function drawGuideLine(){
  const guideWorldY = H * 0.76 + bestY;
  ctx.fillStyle='rgba(255,255,255,.88)';
  for(let x=0;x<W;x+=22){
    ctx.beginPath();
    ctx.arc(x, guideWorldY, 2.6, 0, Math.PI * 2);
    ctx.fill();
  }
}
function drawPan(p){
  const angle=(typeof p.angle === 'number') ? p.angle : panAngle(p);
  const joint=panJoint(p);

  ctx.save();
  ctx.translate(joint.x,joint.y);
  ctx.rotate(angle);

  const topW = p.w;
  const bottomW = p.w * 0.90;
  const thickness = p.h * 0.82;
  const topY = -thickness/2;
  const bottomY = thickness/2;
  const handleLen = panHandleLen();
  const pivotOffset = panPivotOffset();
  const localCx = -p.side*(p.w/2 + pivotOffset);
  const leftX = localCx - topW/2;
  const rightX = localCx + topW/2;
  const handleH = 9.9 * settings.panScale;
  const handleY = topY + 1.1 * settings.panScale;
  const overlap = 5 * settings.panScale;

  if((settings.theme || 'pan') === 'spatula'){
    // 依照參考圖把鍋鏟改成：長細手柄 -> 折角頸部 -> 短而平的鏟面。
    const dir = -p.side; // 左邊器具朝右，右邊器具朝左
    const bladeW = topW * 0.56;
    const bladeH = Math.max(10, thickness * 0.54);
    const neckDrop = 12 * settings.panScale;
    const neckInset = 17 * settings.panScale;
    const stemThick = Math.max(6, handleH * 0.9);
    const startX = localCx - dir * (bladeW/2 + neckInset + handleLen);
    const joinX = localCx - dir * (bladeW/2 + neckInset);
    const bendX = localCx - dir * (bladeW/2 - 2 * settings.panScale);
    const tipX = localCx + dir * (bladeW/2);
    const stemTop = topY + 1.2 * settings.panScale;
    const stemBottom = stemTop + stemThick;
    const bladeTop = stemTop + neckDrop;
    const bladeBottom = bladeTop + bladeH;

    // 鍋鏟主體：淺灰色，輪廓盡量接近你給的參考圖。
    ctx.fillStyle = '#aeb0b2';
    ctx.beginPath();
    if(dir > 0){
      ctx.moveTo(startX, stemTop);
      ctx.lineTo(joinX, stemTop);
      ctx.lineTo(bendX, bladeTop);
      ctx.lineTo(tipX, bladeTop + 3 * settings.panScale);
      ctx.lineTo(tipX, bladeBottom);
      ctx.lineTo(bendX + 4 * settings.panScale, bladeBottom - 2 * settings.panScale);
      ctx.lineTo(joinX, stemBottom);
      ctx.lineTo(startX, stemBottom);
    }else{
      ctx.moveTo(startX, stemTop);
      ctx.lineTo(joinX, stemTop);
      ctx.lineTo(bendX, bladeTop);
      ctx.lineTo(tipX, bladeTop + 3 * settings.panScale);
      ctx.lineTo(tipX, bladeBottom);
      ctx.lineTo(bendX - 4 * settings.panScale, bladeBottom - 2 * settings.panScale);
      ctx.lineTo(joinX, stemBottom);
      ctx.lineTo(startX, stemBottom);
    }
    ctx.closePath();
    ctx.fill();

    // 輕微高光，讓它看起來更像金屬鍋鏟，但維持簡約平面風格。
    ctx.strokeStyle = 'rgba(255,255,255,.28)';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(startX + dir * 8 * settings.panScale, stemTop + 1.2);
    ctx.lineTo(joinX, stemTop + 1.2);
    ctx.lineTo(bendX, bladeTop + 1.5);
    ctx.lineTo(tipX - dir * 6 * settings.panScale, bladeTop + 4 * settings.panScale);
    ctx.stroke();
  }else{
    ctx.fillStyle = '#d6a04a';
    if (p.side === -1) {
      ctx.fillRect(leftX - handleLen, handleY, handleLen + overlap, handleH);
    } else {
      ctx.fillRect(rightX - overlap, handleY, handleLen + overlap, handleH);
    }

    ctx.fillStyle = '#303030';
    ctx.beginPath();
    ctx.moveTo(leftX, topY);
    ctx.lineTo(rightX, topY);
    ctx.lineTo(localCx + bottomW/2, bottomY);
    ctx.lineTo(localCx - bottomW/2, bottomY);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

function drawHand(){
  ctx.save();
  ctx.translate(hand.x,hand.y);
  ctx.scale(settings.handScale, settings.handScale);

  ctx.fillStyle = '#f5b597';
  ctx.beginPath();
  ctx.moveTo(0, -5);
  ctx.lineTo(35, 5);
  ctx.lineTo(85, 18);
  ctx.lineTo(82, 32);
  ctx.lineTo(58, 28);
  ctx.lineTo(53, 75);
  ctx.lineTo(38, 75);
  ctx.lineTo(35, 45);
  ctx.lineTo(25, 75);
  ctx.lineTo(10, 68);
  ctx.lineTo(20, 21);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#f5b597';
  ctx.fillRect(-180, -5, 194, 26);

  drawHeldBacon(HAND_GRIP_X, HAND_GRIP_Y);
  ctx.restore();
}
function drawHeldBacon(x,y){
  const b = settings.baconScale;
  const n = settings.baconSegments;
  const spacing = settings.baconSpacing * b;
  const theme = settings.theme || 'pan';

  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(-0.1);
  ctx.lineCap='butt';
  ctx.lineJoin='round';

  if(theme === 'spatula'){
    ctx.fillStyle = '#fffdf9';
    ctx.beginPath();
    ctx.ellipse(0, spacing * (n-1) * 0.45, 17*b, Math.max(18*b, spacing * (n-1) * 0.56), 0.08, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#f4bf2c';
    ctx.beginPath();
    ctx.arc(1.5*b, spacing * (n-1) * 0.48, 7.2*b, 0, Math.PI*2);
    ctx.fill();
  }else{
    for(let strip=0; strip<2; strip++){
      ctx.lineWidth=13 * b;
      ctx.strokeStyle=strip?'#f7ddd3':'#df8480';
      ctx.beginPath();
      for(let i=0;i<n;i++){
        const t = n <= 1 ? 0 : i / (n - 1);
        const centerX = Math.sin(t * Math.PI * 2.1) * 3.2 * b;
        const px = centerX + (strip ? 5.4 : -5.4) * b;
        const py = i * spacing;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawBacon(){
  if(!baconBodies.length) return;
  const b = settings.baconScale;
  const theme = settings.theme || 'pan';

  if(theme === 'spatula'){
    const upper=[];
    const lower=[];
    for(let i=0;i<baconBodies.length;i++){
      const pos = baconBodies[i].position;
      let nx=0, ny=0;
      if(i<baconBodies.length-1){
        const n=baconBodies[i+1].position;
        nx=n.y-pos.y; ny=-(n.x-pos.x);
      } else {
        const n=baconBodies[i-1].position;
        nx=pos.y-n.y; ny=-(pos.x-n.x);
      }
      const l=Math.hypot(nx,ny)||1; nx/=l; ny/=l;
      const t = baconBodies.length <= 1 ? 0 : i / (baconBodies.length - 1);
      const width = (11 + 4*Math.sin(t*Math.PI)) * b;
      upper.push({x:pos.x+nx*width, y:pos.y+ny*width});
      lower.unshift({x:pos.x-nx*width, y:pos.y-ny*width});
    }
    ctx.fillStyle = '#fffdf9';
    ctx.beginPath();
    ctx.moveTo(upper[0].x, upper[0].y);
    for(const pt of upper) ctx.lineTo(pt.x, pt.y);
    for(const pt of lower) ctx.lineTo(pt.x, pt.y);
    ctx.closePath();
    ctx.fill();
    const c = getBaconCenter();
    ctx.fillStyle = '#f4bf2c';
    ctx.beginPath();
    ctx.arc(c.x, c.y + 2*b, 8.5*b, 0, Math.PI*2);
    ctx.fill();
  }else{
    for(let strip=0; strip<2; strip++){
      ctx.lineWidth=13*b;
      ctx.lineCap='butt';
      ctx.lineJoin='round';
      ctx.strokeStyle=strip?'#f7ddd3':'#df8480';
      ctx.beginPath();
      for(let i=0;i<baconBodies.length;i++){
        const pos = baconBodies[i].position;
        let nx=0, ny=0;
        if(i<baconBodies.length-1){
          const n=baconBodies[i+1].position;
          nx=n.y-pos.y; ny=-(n.x-pos.x);
        } else {
          const n=baconBodies[i-1].position;
          nx=pos.y-n.y; ny=-(pos.x-n.x);
        }
        const l=Math.hypot(nx,ny)||1; nx/=l; ny/=l;
        const offset = (strip ? 5.4 : -5.4) * b;
        const x=pos.x+nx*offset, y=pos.y+ny*offset;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
  }
}

function loop(t){
  const dt = clamp(t-lastTime, 12, 33);
  lastTime = t;
  if(engine) update(1000/60);
  draw();
  requestAnimationFrame(loop);
}

loadSavedSettings();
readSettings();
resize();
initMatter();
reset();
requestAnimationFrame(loop);
</script>
